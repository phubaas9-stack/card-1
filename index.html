<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Arcane Codex — คลังการ์ดสะสม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cinzel+Decorative:wght@700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-void:#12162a;
    --ink-void-2:#191f3a;
    --parchment:#ece2c8;
    --parchment-dim:#cbbf9d;
    --gold:#c9a869;
    --gold-bright:#e6c988;
    --teal:#5fd7e0;
    --wine:#6f2438;
    --wine-bright:#9c3550;
    --violet:#8072b0;
    --common:#8fa1b3;
    --rare:#5fa8d7;
    --legendary:#e6c988;

    --font-display:'Cinzel', serif;
    --font-display-deco:'Cinzel Decorative', serif;
    --font-body:'Spectral', serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(95,215,224,0.10), transparent 45%),
      radial-gradient(ellipse at 90% 10%, rgba(201,168,105,0.10), transparent 40%),
      var(--ink-void);
    color:var(--parchment);
    font-family:var(--font-body);
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ---------- ambient rune particles ---------- */
  .runefield{
    position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
  }
  .rune{
    position:absolute; color:var(--teal); opacity:0.14; font-family:var(--font-mono);
    animation:drift linear infinite;
  }
  @keyframes drift{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.16; }
    90%{ opacity:0.16; }
    100%{ transform:translateY(-120vh) rotate(25deg); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .rune{ animation:none; display:none; }
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  /* ---------- hero ---------- */
  header.hero{
    position:relative; z-index:1;
    text-align:center;
    padding:76px 24px 40px;
  }
  .eyebrow{
    font-family:var(--font-mono);
    letter-spacing:0.35em;
    font-size:11px;
    color:var(--teal);
    text-transform:uppercase;
    margin-bottom:18px;
  }
  h1.title{
    font-family:var(--font-display-deco);
    font-size:clamp(34px, 6vw, 64px);
    line-height:1.1;
    margin:0;
    color:var(--parchment);
    text-shadow:0 0 28px rgba(95,215,224,0.25);
    letter-spacing:0.02em;
  }
  .title em{
    font-style:normal;
    color:var(--gold-bright);
  }
  p.subtitle{
    max-width:520px;
    margin:18px auto 0;
    color:var(--parchment-dim);
    font-size:16px;
    line-height:1.6;
  }
  .spine{
    width:220px; height:1px; margin:36px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    position:relative;
  }
  .spine::before{
    content:'✦';
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:var(--ink-void); color:var(--gold); padding:0 12px; font-size:13px;
  }

  /* ---------- filter tabs (bookmarks) ---------- */
  nav.filters{
    position:sticky; top:0; z-index:5;
    display:flex; justify-content:center; gap:0;
    padding:16px 12px;
    background:linear-gradient(180deg, var(--ink-void) 60%, transparent);
    flex-wrap:wrap;
  }
  .filter-btn{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    background:var(--ink-void-2);
    color:var(--parchment-dim);
    border:1px solid rgba(201,168,105,0.25);
    padding:9px 18px;
    cursor:pointer;
    transition:all .25s ease;
    position:relative;
    margin:4px;
    border-radius:2px;
  }
  .filter-btn:hover{ color:var(--parchment); border-color:var(--gold); }
  .filter-btn[aria-pressed="true"]{
    background:var(--gold);
    color:var(--ink-void);
    border-color:var(--gold);
    font-weight:600;
  }
  .filter-btn:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }

  /* ---------- grid ---------- */
  main{
    position:relative; z-index:1;
    max-width:1180px;
    margin:0 auto;
    padding:20px 24px 100px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:34px;
    min-height:200px;
  }

  /* ---------- card ---------- */
  .card-slot{ perspective:1400px; }
  .card{
    position:relative;
    width:100%;
    aspect-ratio:5/7.3;
    transform-style:preserve-3d;
    transition:transform .7s cubic-bezier(.2,.8,.2,1);
    cursor:pointer;
  }
  .card-slot.flipped .card{ transform:rotateY(180deg); }

  .card:focus-visible{ outline:2px solid var(--teal); outline-offset:6px; }

  .face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:10px;
    overflow:hidden;
    display:flex; flex-direction:column;
  }

  /* front */
  .face-front{
    background:var(--ink-void-2);
    border:1px solid rgba(201,168,105,0.35);
    box-shadow:0 12px 30px rgba(0,0,0,0.45);
  }
  .card-slot[data-rarity="legendary"] .face-front{ box-shadow:0 0 0 1px var(--legendary), 0 16px 40px rgba(230,201,136,0.18), 0 12px 30px rgba(0,0,0,0.45); }
  .card-slot[data-rarity="rare"] .face-front{ box-shadow:0 0 0 1px var(--rare), 0 12px 30px rgba(0,0,0,0.45); }
  .card-slot[data-rarity="common"] .face-front{ box-shadow:0 0 0 1px var(--common), 0 12px 30px rgba(0,0,0,0.45); }

  .art-wrap{
    position:relative;
    flex:1;
    overflow:hidden;
    background:var(--ink-void);
  }
  .art-wrap img{
    width:100%; height:100%; object-fit:cover;
    display:block;
    filter:saturate(1.05);
    transition:transform .6s ease;
  }
  .card-slot:hover .art-wrap img{ transform:scale(1.05); }
  .art-wrap::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(18,22,42,0) 55%, rgba(18,22,42,0.92) 100%);
  }

  .rarity-tag{
    position:absolute; top:10px; right:10px; z-index:2;
    font-family:var(--font-mono);
    font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
    padding:4px 8px; border-radius:2px;
    background:rgba(18,22,42,0.75);
    backdrop-filter:blur(2px);
  }
  .card-slot[data-rarity="legendary"] .rarity-tag{ color:var(--legendary); border:1px solid var(--legendary); }
  .card-slot[data-rarity="rare"] .rarity-tag{ color:var(--rare); border:1px solid var(--rare); }
  .card-slot[data-rarity="common"] .rarity-tag{ color:var(--common); border:1px solid var(--common); }

  .card-name-front{
    position:absolute; bottom:14px; left:14px; right:14px; z-index:2;
    font-family:var(--font-display);
    font-size:17px;
    letter-spacing:0.03em;
    color:var(--parchment);
  }
  .hint{
    position:absolute; top:10px; left:10px; z-index:2;
    font-family:var(--font-mono); font-size:9px; letter-spacing:.08em;
    color:var(--parchment-dim); text-transform:uppercase;
    background:rgba(18,22,42,0.6); padding:3px 7px; border-radius:2px;
    opacity:0; transition:opacity .25s ease;
  }
  .card-slot:hover .hint, .card-slot:focus-within .hint{ opacity:1; }

  /* back */
  .face-back{
    background:
      repeating-linear-gradient(135deg, rgba(0,0,0,0.05) 0 2px, transparent 2px 6px),
      linear-gradient(160deg, var(--wine) 0%, #4a1626 100%);
    transform:rotateY(180deg);
    border:1px solid var(--gold);
    padding:18px 16px;
    display:flex; flex-direction:column;
    box-shadow:0 12px 30px rgba(0,0,0,0.45);
  }
  .face-back h3{
    font-family:var(--font-display);
    font-size:17px;
    margin:0 0 4px;
    color:var(--gold-bright);
  }
  .face-back .type-line{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:rgba(236,226,200,0.65);
    margin-bottom:10px;
  }
  .stat-row{
    display:flex; gap:10px; flex-wrap:wrap;
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--parchment);
    margin-bottom:12px;
  }
  .stat-row span{
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(230,201,136,0.35);
    padding:3px 7px;
    border-radius:2px;
  }
  .divider-rune{
    text-align:center; color:var(--gold); opacity:.5; font-size:11px; margin:2px 0 10px;
    letter-spacing:.3em;
  }
  .desc{
    font-size:12.5px;
    line-height:1.65;
    color:rgba(236,226,200,0.92);
    overflow-y:auto;
    flex:1;
  }
  .desc::-webkit-scrollbar{ width:4px; }
  .desc::-webkit-scrollbar-thumb{ background:rgba(230,201,136,0.4); border-radius:2px; }

  .empty-state, .status-msg{
    grid-column:1/-1;
    text-align:center;
    padding:60px 20px;
    color:var(--parchment-dim);
    font-family:var(--font-mono);
    font-size:13px;
    letter-spacing:.05em;
  }
  .status-msg.error{ color:var(--wine-bright); }

  footer{
    position:relative; z-index:1;
    text-align:center;
    padding:0 20px 60px;
    color:var(--parchment-dim);
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.05em;
  }

  @media (max-width:520px){
    main{ grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:20px; padding:12px 16px 70px; }
    header.hero{ padding:52px 18px 28px; }
  }
</style>
</head>
<body>

<div class="runefield" id="runefield" aria-hidden="true"></div>

<header class="hero">
  <div class="eyebrow">Codex Arcanum · เล่มที่ I</div>
  <h1 class="title">The Arcane <em>Codex</em></h1>
  <p class="subtitle">คลังการ์ดสะสมของนักเวทแห่งหอสมุด แต่ละใบผนึกด้วยอักขระเรืองแสง กดที่การ์ดเพื่อพลิกดูรายละเอียด</p>
  <div class="spine"></div>
</header>

<nav class="filters" id="filters" role="tablist" aria-label="กรองตามระดับความหายาก"></nav>

<main id="grid">
  <div class="status-msg" id="statusMsg">กำลังเปิดคัมภีร์...</div>
</main>

<footer>❦ ขยับเมาส์ผ่านการ์ดเพื่อดูแสงรูน · แตะ/คลิกเพื่อพลิกดูคำอธิบาย ❦</footer>

<script>
/* =========================================================
   โหลดข้อมูลการ์ดแบบ dynamic:
   1. อ่านรายชื่อไฟล์จาก cards/manifest.json
   2. fetch แต่ละไฟล์ json ใน cards/ ตามรายชื่อนั้น
   3. เอามาเรนเดอร์เป็นการ์ด

   หมายเหตุ: การ fetch ไฟล์ local ต้องรันผ่าน web server
   (เช่น GitHub Pages, `python3 -m http.server`, Live Server ของ VSCode)
   เปิดไฟล์ตรง ๆ แบบ file:// เบราว์เซอร์บางตัวจะบล็อก fetch()
   ========================================================= */

let CARDS = [];

async function loadCards(){
  const statusEl = document.getElementById('statusMsg');
  try{
    const manifestRes = await fetch('cards/manifest.json');
    if(!manifestRes.ok) throw new Error('อ่าน manifest.json ไม่สำเร็จ');
    const fileList = await manifestRes.json();

    const cardResults = await Promise.all(
      fileList.map(async (filename) => {
        const res = await fetch(`cards/${filename}`);
        if(!res.ok){
          console.warn(`โหลดไม่สำเร็จ: ${filename}`);
          return null;
        }
        return res.json();
      })
    );

    CARDS = cardResults.filter(Boolean);

    if(CARDS.length === 0){
      statusEl.textContent = '— ยังไม่มีการ์ดในคัมภีร์ —';
      return;
    }

    buildFilters();
    renderGrid();
  }catch(err){
    console.error(err);
    statusEl.textContent = 'เปิดคัมภีร์ไม่สำเร็จ: ต้องรันผ่าน web server (ดู README.md)';
    statusEl.classList.add('error');
  }
}

/* ---------------- ambient runes ---------------- */
const RUNE_GLYPHS = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ'];
const field = document.getElementById('runefield');
const RUNE_COUNT = window.innerWidth < 600 ? 10 : 20;
for(let i=0;i<RUNE_COUNT;i++){
  const el = document.createElement('span');
  el.className='rune';
  el.textContent = RUNE_GLYPHS[Math.floor(Math.random()*RUNE_GLYPHS.length)];
  el.style.left = Math.random()*100+'vw';
  el.style.bottom = (-10 - Math.random()*20)+'vh';
  el.style.fontSize = (12+Math.random()*14)+'px';
  el.style.animationDuration = (14+Math.random()*18)+'s';
  el.style.animationDelay = (Math.random()*14)+'s';
  field.appendChild(el);
}

/* ---------------- render ---------------- */
const grid = document.getElementById('grid');
const filtersEl = document.getElementById('filters');
const RARITY_ORDER = ['all','common','rare','legendary'];
const RARITY_LABEL = {all:'ทั้งหมด', common:'Common', rare:'Rare', legendary:'Legendary'};
let activeFilter = 'all';

function buildFilters(){
  filtersEl.innerHTML = '';
  RARITY_ORDER.forEach(r=>{
    const btn = document.createElement('button');
    btn.className='filter-btn';
    btn.textContent = RARITY_LABEL[r];
    btn.setAttribute('role','tab');
    btn.setAttribute('aria-pressed', r===activeFilter ? 'true':'false');
    btn.addEventListener('click', ()=>{
      activeFilter = r;
      [...filtersEl.children].forEach(c=>c.setAttribute('aria-pressed','false'));
      btn.setAttribute('aria-pressed','true');
      renderGrid();
    });
    filtersEl.appendChild(btn);
  });
}

function cardSlotHTML(card){
  const statHTML = (card.stats||[]).map(s=>`<span>${s}</span>`).join('');
  return `
    <div class="card-slot" data-rarity="${card.rarity.toLowerCase()}" tabindex="0" role="button"
         aria-label="การ์ด ${card.name}, ${RARITY_LABEL[card.rarity.toLowerCase()]||card.rarity}, กดเพื่อพลิกดูรายละเอียด">
      <div class="card">
        <div class="face face-front">
          <span class="hint">แตะเพื่อพลิก</span>
          <span class="rarity-tag">${card.rarity}</span>
          <div class="art-wrap"><img src="${card.image}" alt="${card.name}" loading="lazy" /></div>
          <div class="card-name-front">${card.name}</div>
        </div>
        <div class="face face-back">
          <h3>${card.name}</h3>
          <div class="type-line">${card.type||''}</div>
          <div class="stat-row">${statHTML}</div>
          <div class="divider-rune">◆ ◇ ◆</div>
          <div class="desc">${card.description}</div>
        </div>
      </div>
    </div>
  `;
}

function renderGrid(){
  const list = activeFilter==='all' ? CARDS : CARDS.filter(c=>c.rarity.toLowerCase()===activeFilter);
  if(list.length===0){
    grid.innerHTML = `<div class="empty-state">— ยังไม่มีการ์ดในหมวดนี้ —</div>`;
    return;
  }
  grid.innerHTML = list.map(cardSlotHTML).join('');

  grid.querySelectorAll('.card-slot').forEach(slot=>{
    const toggle = ()=> slot.classList.toggle('flipped');
    slot.addEventListener('click', toggle);
    slot.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggle(); }
    });
  });
}

loadCards();
</script>
</body>
</html>
